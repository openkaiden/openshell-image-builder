name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-26
          - target: aarch64-apple-darwin
            runner: macos-26
          - target: x86_64-pc-windows-msvc
            runner: windows-2025-vs2026
          - target: aarch64-pc-windows-msvc
            runner: windows-2025-vs2026
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          cargo set-version "${VERSION#v}"

      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Build
        if: matrix.use_cross != true
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Import signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_CERTIFICATE: ${{ secrets.APPLE_SIGNING_CERTIFICATE }}
          APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          echo "$APPLE_SIGNING_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 900 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_SIGNING_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Sign binary
        if: runner.os == 'macOS'
        run: |
          IDENTITY=$(security find-identity -v -p codesigning "$RUNNER_TEMP/signing.keychain-db" \
            | grep "Developer ID Application" \
            | awk '{print $2}')
          codesign \
            --deep \
            --force \
            --sign "$IDENTITY" \
            --options runtime \
            target/${{ matrix.target }}/release/openshell-image-builder

      - name: Notarize binary
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          zip -j "$RUNNER_TEMP/openshell-image-builder.zip" \
            target/${{ matrix.target }}/release/openshell-image-builder
          xcrun notarytool submit "$RUNNER_TEMP/openshell-image-builder.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Clean up keychain
        if: always() && runner.os == 'macOS'
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openshell-image-builder-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/openshell-image-builder${{ contains(matrix.target, 'windows') && '.exe' || '' }}

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: false

      - name: Rename artifacts with platform suffix
        run: |
          for dir in artifacts/*/; do
            platform=$(basename "$dir")
            if [ -f "$dir/openshell-image-builder.exe" ]; then
              mv "$dir/openshell-image-builder.exe" "$dir/$platform.exe"
            elif [ -f "$dir/openshell-image-builder" ]; then
              mv "$dir/openshell-image-builder" "$dir/$platform"
            fi
          done

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/**/*

  bump-next-version:
    name: Bump Next Version
    runs-on: ubuntu-24.04
    needs: release
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Compute next version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          NEXT_VERSION="${MAJOR}.$((MINOR + 1)).0-next"
          echo "next_version=${NEXT_VERSION}" >> $GITHUB_OUTPUT

      - name: Bump version
        run: cargo set-version "${{ steps.version.outputs.next_version }}"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.KAIDEN_BOT_TOKEN }}
        run: |
          BRANCH="bump-next-${{ steps.version.outputs.next_version }}"
          git checkout -b "$BRANCH"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to ${{ steps.version.outputs.next_version }}"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "chore: bump version to ${{ steps.version.outputs.next_version }}" \
            --body "Bump version to \`${{ steps.version.outputs.next_version }}\` after release \`${{ github.ref_name }}\`." \
            --base main \
            --head "$BRANCH")
          echo "Pull request created: ${PR_URL}"
          gh pr ready "${PR_URL}"
          gh pr merge "${PR_URL}" --auto --rebase
